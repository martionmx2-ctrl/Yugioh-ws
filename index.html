<!DOCTYPE html>
<html>
<head>
  <title>Kaiba Duel System</title>

<style>

*{
  box-sizing:border-box;
}

<body>

<h1>⚡ KAIBA DUEL SYSTEM ⚡</h1>

<h2 id="turnText">Loading...</h2>

<div class="game-container">

  <!-- LEFT PANEL -->

  <div class="left-panel">

    <div class="hud-box">

      <h2>YOU</h2>

      <div class="lp">
        LP:
        <span id="playerLP">4000</span>
      </div>

      <br>

      Deck:
      <span id="deckCount">0</span>

    </div>

    <button onclick="drawCard()">
      DRAW CARD
    </button>

    <button onclick="attackPhase()">
      ATTACK PHASE
    </button>

    <button onclick="window.location.href='deck.html'">
      🃏 DECK BUILDER
    </button>

  </div>

  <!-- ARENA -->

  <div class="arena">

    <!-- ENEMY FIELD -->

    <div class="field-row">

      <div class="zone" id="enemy0"
        onclick="selectTarget(0)">
      </div>

      <div class="zone" id="enemy1"
        onclick="selectTarget(1)">
      </div>

      <div class="zone" id="enemy2"
        onclick="selectTarget(2)">
      </div>

    </div>

    <div class="middle-text">
      DUEL ARENA
    </div>

    <!-- PLAYER FIELD -->

    <div class="field-row" id="playerField">

      <div class="zone"
        onclick="placeCard(0)">
      </div>

      <div class="zone"
        onclick="placeCard(1)">
      </div>

      <div class="zone"
        onclick="placeCard(2)">
      </div>

    </div>

  </div>

  <!-- RIGHT PANEL -->

  <div class="right-panel">

    <div class="hud-box">

      <h2>ENEMY</h2>

      <div class="lp">
        LP:
        <span id="enemyLP">4000</span>
      </div>

    </div>

    <div class="hud-box">

      <h2>DUEL LOG</h2>

      <p>⚡ Duel initialized...</p>

    </div>

  </div>

</div>

<!-- HAND -->

<div id="hand" class="hand"></div>

</body>
  margin:0;
  overflow:hidden;

  font-family:Arial, sans-serif;

  background:
    radial-gradient(circle at center,
    #101840 0%,
    #050816 55%,
    #000814 100%);

  color:cyan;
}

/* ANIMATED BACKGROUND */

body::before{
  content:"";

  position:fixed;
  inset:0;

  background-image:
    radial-gradient(cyan 1px, transparent 1px);

  background-size:50px 50px;

  opacity:.08;

  animation:bgMove 20s linear infinite;

  pointer-events:none;
}

@keyframes bgMove{
  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(-200px);
  }
}

/* TITLE */

h1{
  text-align:center;

  font-size:42px;

  letter-spacing:4px;

  text-shadow:
    0 0 10px cyan,
    0 0 20px cyan,
    0 0 40px blue;
}

/* TURN TEXT */

#turnText{
  text-align:center;

  text-shadow:
    0 0 10px cyan;
}

/* MAIN GAME LAYOUT */

.game-container{

  display:flex;

  justify-content:space-between;

  align-items:center;

  width:100vw;
  height:78vh;

  padding:20px;
}

/* SIDE HUDS */

.left-panel,
.right-panel{

  width:240px;

  display:flex;

  flex-direction:column;

  gap:20px;
}

/* HUD BOXES */

.hud-box{

  background:rgba(0,20,60,.45);

  border:1px solid cyan;

  border-radius:15px;

  padding:20px;

  backdrop-filter:blur(10px);

  box-shadow:
    0 0 20px cyan,
    inset 0 0 20px rgba(0,255,255,.15);
}

/* DUEL FIELD */

.arena{

  display:flex;

  flex-direction:column;

  align-items:center;

  justify-content:center;

  gap:50px;
}

/* FIELD ROWS */

.field-row{

  display:flex;

  gap:20px;
}

/* CARD ZONES */

.zone{

  width:120px;
  height:170px;

  border-radius:14px;

  border:2px solid rgba(0,255,255,.7);

  background:
    linear-gradient(
      145deg,
      rgba(0,255,255,.08),
      rgba(0,0,40,.55)
    );

  background-size:cover;
  background-position:center;

  display:flex;

  justify-content:center;
  align-items:end;

  padding-bottom:8px;

  font-size:14px;
  font-weight:bold;

  text-shadow:0 0 10px black;

  box-shadow:
    0 0 15px cyan,
    inset 0 0 20px rgba(0,255,255,.2);

  transition:.25s;

  cursor:pointer;
}

.zone:hover{

  transform:
    scale(1.05)
    translateY(-5px);

  box-shadow:
    0 0 25px cyan,
    0 0 60px blue;
}

/* TARGET */

.target{
  box-shadow:
    0 0 25px red,
    0 0 50px crimson !important;
}

/* CENTER TEXT */

.middle-text{

  font-size:38px;

  letter-spacing:6px;

  text-shadow:
    0 0 15px cyan,
    0 0 40px blue;
}

/* HAND BAR */

.hand{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  height:170px;

  display:flex;

  justify-content:center;

  align-items:center;

  gap:15px;

  background:rgba(0,0,30,.75);

  backdrop-filter:blur(10px);

  border-top:2px solid cyan;

  box-shadow:
    0 -5px 20px rgba(0,255,255,.25);
}

/* HAND CARDS */

.hand-card{

  width:90px;
  height:130px;

  border-radius:10px;

  border:2px solid rgba(0,255,255,.6);

  background-size:cover;

  transition:.25s;

  cursor:pointer;

  box-shadow:
    0 0 10px rgba(0,255,255,.5);
}

.hand-card:hover{

  transform:
    translateY(-25px)
    scale(1.08);

  box-shadow:
    0 0 30px cyan,
    0 0 50px blue;
}

/* BUTTONS */

button{

  padding:14px;

  border:none;

  border-radius:12px;

  background:
    linear-gradient(
      145deg,
      rgba(0,255,255,.25),
      rgba(0,120,255,.2)
    );

  color:cyan;

  font-weight:bold;

  letter-spacing:1px;

  cursor:pointer;

  box-shadow:
    0 0 15px cyan;

  transition:.25s;
}

button:hover{

  transform:scale(1.05);

  box-shadow:
    0 0 25px cyan,
    0 0 50px blue;
}

/* LP */

.lp{
  font-size:24px;

  text-shadow:
    0 0 10px cyan;
}

</style>
</head>
<body>

<h1>⚡ KAIBA DUEL SYSTEM ⚡</h1>

<button onclick="window.location.href='deck.html'">🃏 Deck Builder</button>

<h2 id="turnText">Loading...</h2>

<div class="lp">
  You: <span id="playerLP">4000</span> |
  Enemy: <span id="enemyLP">4000</span>
</div>

<div>Deck: <span id="deckCount">0</span></div>

<button onclick="drawCard()">Draw</button>
<button onclick="attackPhase()">Attack Phase</button>

<h2>Hand</h2>
<div id="hand" class="hand"></div>

<h2>Enemy Field</h2>
<div class="field-row">
  <div class="zone" id="enemy0" onclick="selectTarget(0)"></div>
  <div class="zone" id="enemy1" onclick="selectTarget(1)"></div>
  <div class="zone" id="enemy2" onclick="selectTarget(2)"></div>
</div>

<h2>Your Field</h2>
<div class="field-row" id="playerField">
  <div class="zone" onclick="placeCard(0)"></div>
  <div class="zone" onclick="placeCard(1)"></div>
  <div class="zone" onclick="placeCard(2)"></div>
</div>

<script>

let baseCards=[];
let deck=[], hand=[];
let playerField=[null,null,null];
let enemyField=[null,null,null];

let selected=null;
let selectedTarget=null;

let playerTurn=true;

async function getCard(name){
  let res=await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(name)}`);
  let data=await res.json();
  let c=data.data[0];

  return {
    name:c.name,
    atk:c.atk||0,
    def:c.def||0,
    type:c.type,
    img:c.card_images[0].image_url
  };
}

async function startGame(){
  let savedDeck = localStorage.getItem("myDeck");

  if(savedDeck){
    baseCards = JSON.parse(savedDeck);
  } else {
    baseCards = [
      await getCard("Blue-Eyes White Dragon"),
      await getCard("Dark Magician"),
      await getCard("Red-Eyes Black Dragon")
    ];
  }

  buildDeck();

  for(let i=0;i<5;i++) drawCard();

  enemyField[0]=baseCards[0];
  renderEnemyField();
  updateTurn();
}

function buildDeck(){
  deck = [...baseCards];
  shuffleDeck();
  updateDeckCount();
}

function shuffleDeck(){
  for(let i = deck.length - 1; i > 0; i--){
    let j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
}

function drawCard(){
  if(!playerTurn || deck.length === 0) return;

  let card = deck.pop();
  hand.push(card);

  renderHand();
  updateDeckCount();
}

function updateDeckCount(){
  document.getElementById("deckCount").innerText = deck.length;
}

function renderHand(){
  let h=document.getElementById("hand");
  h.innerHTML="";

  hand.forEach((c,i)=>{
    let d=document.createElement("div");
    d.className="hand-card";
    d.style.backgroundImage=`url(${c.img})`;

    d.onclick=()=>{ selected=i; };

    h.appendChild(d);
  });
}

function placeCard(i){
  if(selected===null) return;
  if(playerField[i]) return;

  let card=hand[selected];

  playerField[i]=card;

  let z=document.getElementById("playerField").children[i];
  z.style.backgroundImage=`url(${card.img})`;
  z.innerText="ATK:"+card.atk;

  hand.splice(selected,1);
  selected=null;
  renderHand();
}

function selectTarget(i){
  selectedTarget=i;

  for(let x=0;x<3;x++){
    document.getElementById("enemy"+x).classList.remove("target");
  }

  document.getElementById("enemy"+i).classList.add("target");
}

function attackPhase(){
  if(!playerTurn) return;

  playerField.forEach(attacker=>{
    if(!attacker) return;

    let target=enemyField[selectedTarget];

    if(target){
      if(attacker.atk>target.atk){
        enemyField[selectedTarget]=null;
        document.getElementById("enemyLP").innerText -= (attacker.atk-target.atk);
      } else {
        document.getElementById("playerLP").innerText -= (target.atk-attacker.atk);
      }
    } else {
      document.getElementById("enemyLP").innerText -= attacker.atk;
    }
  });

  renderEnemyField();
  enemyTurn();
}

function enemyTurn(){
  playerTurn=false;
  updateTurn();

  setTimeout(()=>{
    let best = baseCards.reduce((a,b)=> a.atk>b.atk?a:b);
    enemyField[0]=best;

    let dmg=enemyField.reduce((s,c)=>s+(c?c.atk:0),0);
    document.getElementById("playerLP").innerText -= dmg;

    renderEnemyField();
    playerTurn=true;
    updateTurn();
  },1000);
}

function renderEnemyField(){
  for(let i=0;i<3;i++){
    let z=document.getElementById("enemy"+i);
    let c=enemyField[i];

    if(c){
      z.style.backgroundImage=`url(${c.img})`;
      z.innerText="ATK:"+c.atk;
    } else {
      z.style.backgroundImage="";
      z.innerText="";
    }
  }
}

function updateTurn(){
  document.getElementById("turnText").innerText = playerTurn?"Your Turn":"Enemy Turn";
}

window.onload=startGame;

</script>

</body>
</html>
