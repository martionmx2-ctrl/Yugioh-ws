<!DOCTYPE html>
<html>
<head>
  <title>Duel Interface</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000 40%, #020024 100%);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    nav {
      background: black;
      padding: 15px;
      border-bottom: 2px solid cyan;
    }

    nav a {
      color: cyan;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .lp {
      font-size: 20px;
      margin: 10px;
    }

    .field {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }

    .zone {
      width: 120px;
      height: 160px;
      border: 2px solid cyan;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      white-space: pre-line;
      font-size: 12px;
    }

    .zone:hover {
      box-shadow: 0 0 15px cyan;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: cyan;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    /* HAND */
    .hand {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
    }

    .hand-card {
      width: 80px;
      height: 120px;
      background-size: cover;
      border: 2px solid gold;
      cursor: pointer;
    }

    .selected {
      box-shadow: 0 0 20px yellow;
    }

    /* DRAW ANIMATION */
    .draw-anim {
      position: fixed;
      top: 40%;
      left: 50%;
      width: 100px;
      height: 140px;
      background-size: cover;
      transform: translate(-50%, -50%) scale(0.5);
      opacity: 0;
      z-index: 1000;
      animation: drawCardAnim 0.6s ease-out forwards;
      box-shadow: 0 0 25px cyan;
    }

    @keyframes drawCardAnim {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
      50% { transform: translate(-50%, -60%) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, 200%) scale(0.6); opacity: 0; }
    }

    /* GAME OVER */
    .game-over {
      position: fixed;
      top:0; left:0;
      width:100%; height:100%;
      display:none;
      justify-content:center;
      align-items:center;
      background: radial-gradient(circle, black 40%, #020024 100%);
      z-index:2000;
    }

    .game-over h1 {
      font-size:60px;
      text-shadow:0 0 20px cyan;
    }

    .game-over button {
      padding:15px 30px;
      font-size:18px;
    }
  </style>
</head>

<body>

<h1>⚡ DUEL ARENA ⚡</h1>
<h2 id="turnText">Your Turn</h2>

<div class="lp">
  You: <span id="playerLP">4000</span> |
  Enemy: <span id="enemyLP">4000</span>
</div>

<button onclick="drawCard()">Draw Card</button>
<button onclick="attack()">Attack</button>

<h2>Your Hand</h2>
<div id="hand" class="hand"></div>

<h2>Your Field</h2>
<div class="field" id="playerField">
  <div class="zone" onclick="placeCard(0)"></div>
  <div class="zone" onclick="placeCard(1)"></div>
  <div class="zone" onclick="placeCard(2)"></div>
</div>

<h2>Enemy Field</h2>
<div class="field">
  <div class="zone" id="enemy0"></div>
  <div class="zone" id="enemy1"></div>
  <div class="zone" id="enemy2"></div>
</div>

<div id="gameOverScreen" class="game-over">
  <div>
    <h1 id="gameResult"></h1>
    <button onclick="restartGame()">Restart Duel</button>
  </div>
</div>

<script>
let cards = [
  {name:"Blue-Eyes", atk:3000, img:"https://images.ygoprodeck.com/images/cards/89631139.jpg"},
  {name:"Dark Magician", atk:2500, img:"https://images.ygoprodeck.com/images/cards/46986414.jpg"},
  {name:"Red-Eyes", atk:2400, img:"https://images.ygoprodeck.com/images/cards/74677422.jpg"}
];

let hand=[], selected=null;
let playerField=[null,null,null];
let enemyField=[null,null,null];

let playerTurn=true, gameOver=false;

function drawCard(){
  if(!playerTurn||gameOver) return;

  let card=cards[Math.floor(Math.random()*cards.length)];
  hand.push(card);

  let anim=document.createElement("div");
  anim.className="draw-anim";
  anim.style.backgroundImage=`url(${card.img})`;
  document.body.appendChild(anim);

  setTimeout(()=>{
    anim.remove();
    renderHand();
  },600);
}

function renderHand(){
  let h=document.getElementById("hand");
  h.innerHTML="";
  hand.forEach((c,i)=>{
    let d=document.createElement("div");
    d.className="hand-card";
    d.style.backgroundImage=`url(${c.img})`;
    if(i===selected) d.classList.add("selected");
    d.onclick=()=>{selected=i;renderHand();}
    h.appendChild(d);
  });
}

function placeCard(i){
  if(gameOver||selected===null||playerField[i]) return;

  let card=hand[selected];
  playerField[i]=card;

  let zone=document.getElementById("playerField").children[i];
  zone.style.backgroundImage=`url(${card.img})`;
  zone.innerText="ATK:"+card.atk;

  hand.splice(selected,1);
  selected=null;
  renderHand();
}

function attack(){
  if(!playerTurn||gameOver) return;

  let dmg=playerField.reduce((s,c)=>s+(c?c.atk:0),0);
  let e=document.getElementById("enemyLP");
  e.innerText=Math.max(0,e.innerText-dmg);

  checkGame();
  if(!gameOver){
    playerTurn=false;
    setTimeout(enemyTurn,1000);
  }
}

function enemyTurn(){
  if(gameOver) return;

  let i=Math.floor(Math.random()*3);
  let card=cards[Math.floor(Math.random()*cards.length)];
  enemyField[i]=card;

  let z=document.getElementById("enemy"+i);
  z.style.backgroundImage=`url(${card.img})`;
  z.innerText="ATK:"+card.atk;

  let dmg=enemyField.reduce((s,c)=>s+(c?c.atk:0),0);
  let p=document.getElementById("playerLP");
  p.innerText=Math.max(0,p.innerText-dmg);

  checkGame();
  playerTurn=true;
}

function checkGame(){
  let p=parseInt(playerLP.innerText);
  let e=parseInt(enemyLP.innerText);
  if(e<=0) end("YOU WIN");
  if(p<=0) end("YOU LOSE");
}

function end(msg){
  gameOver=true;
  document.getElementById("gameResult").innerText=msg;
  document.getElementById("gameOverScreen").style.display="flex";
}

function restartGame(){
  location.reload();
}
</script>

</body>
</html>
