<!DOCTYPE html>
<html>
<head>
  <title>Kaiba Duel System</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000 40%, #020024 100%);
      color: cyan;
      font-family: Arial;
      text-align: center;
    }

    h1 { text-shadow: 0 0 15px cyan; }

    .lp { font-size: 20px; margin: 10px; }

    .field-row {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 10px;
    }

    .zone {
      width: 120px;
      height: 160px;
      border: 2px solid cyan;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 0 10px cyan;
      position: relative;
    }

    .zone:hover { transform: scale(1.05); }
    .target { box-shadow: 0 0 25px red !important; }

    .hand { display:flex; justify-content:center; gap:10px; margin:20px; }

    .hand-card {
      width:80px; height:120px;
      border:2px solid gold;
      background-size:cover;
      cursor:pointer;
    }

    .facedown {
      background: black !important;
      border:2px solid purple;
    }

    button {
      padding:10px 20px;
      background:cyan;
      border:none;
      margin:5px;
      cursor:pointer;
    }

    .summon {
      position: fixed;
      top:50%; left:50%;
      transform: translate(-50%, -50%) scale(0.5);
      opacity:0;
      width:200px; height:300px;
      background-size:cover;
      box-shadow:0 0 40px cyan;
      animation: summon 1s forwards;
      z-index:999;
    }

    @keyframes summon {
      0% {opacity:0; transform:translate(-50%,-50%) scale(0.5);}
      50% {opacity:1; transform:translate(-50%,-60%) scale(1.3);}
      100% {opacity:0; transform:translate(-50%,200%) scale(0.6);}
    }
  </style>
</head>
<body>

<h1>⚡ KAIBA DUEL SYSTEM ⚡</h1>
<h2 id="turnText">Loading...</h2>

<div class="lp">
  You: <span id="playerLP">4000</span> |
  Enemy: <span id="enemyLP">4000</span>
</div>

<button onclick="drawCard()">Draw</button>
<button onclick="attackPhase()">Attack Phase</button>

<h2>Hand</h2>
<div id="hand" class="hand"></div>

<h2>Enemy Field</h2>
<div class="field-row">
  <div class="zone" id="enemy0" onclick="selectTarget(0)"></div>
  <div class="zone" id="enemy1" onclick="selectTarget(1)"></div>
  <div class="zone" id="enemy2" onclick="selectTarget(2)"></div>
</div>

<h2>Your Field</h2>
<div class="field-row" id="playerField">
  <div class="zone" onclick="placeCard(0)"></div>
  <div class="zone" onclick="placeCard(1)"></div>
  <div class="zone" onclick="placeCard(2)"></div>
</div>

<script>

let baseCards=[];
let deck=[], hand=[];
let playerField=[null,null,null];
let enemyField=[null,null,null];

let selected=null;
let selectedTarget=null;

let playerTurn=true;
let chain=[];

async function getCard(name){
  let res=await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(name)}`);
  let data=await res.json();
  let c=data.data[0];

  return {
    name:c.name,
    atk:c.atk||0,
    def:c.def||0,
    type:c.type,
    img:c.card_images[0].image_url
  };
}

async function startGame(){
  baseCards=[
    await getCard("Blue-Eyes White Dragon"),
    await getCard("Dark Magician"),
    await getCard("Mirror Force"),
    await getCard("Raigeki")
  ];

  buildDeck();

  for(let i=0;i<5;i++) drawCard();

  enemyField[0]=baseCards[0];
  renderEnemyField();
  updateTurn();
}

function buildDeck(){
  deck=[];
  baseCards.forEach(c=>{
    for(let i=0;i<3;i++) deck.push({...c});
  });
}

function drawCard(){
  if(!playerTurn) return;
  let c=deck.pop();
  if(!c) return;
  hand.push(c);
  renderHand();
}

function renderHand(){
  let h=document.getElementById("hand");
  h.innerHTML="";

  hand.forEach((c,i)=>{
    let d=document.createElement("div");
    d.className="hand-card";
    d.style.backgroundImage=`url(${c.img})`;

    d.onclick=()=>{ selected=i; };

    h.appendChild(d);
  });
}

function summonAnim(img){
  let el=document.createElement("div");
  el.className="summon";
  el.style.backgroundImage=`url(${img})`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function placeCard(i){
  if(selected===null) return;
  if(playerField[i]) return;

  let card=hand[selected];

  // spell
  if(card.type.includes("Spell")){
    chain.push(card);
    resolveChain();
    hand.splice(selected,1);
    selected=null;
    renderHand();
    return;
  }

  // trap face-down
  if(card.type.includes("Trap")){
    playerField[i]={...card, facedown:true};
    let z=document.getElementById("playerField").children[i];
    z.classList.add("facedown");
    z.innerText="";
  } else {
    playerField[i]=card;
    summonAnim(card.img);

    let z=document.getElementById("playerField").children[i];
    z.style.backgroundImage=`url(${card.img})`;
    z.innerText="ATK:"+card.atk;
  }

  hand.splice(selected,1);
  selected=null;
  renderHand();
}

function resolveChain(){
  let reversed=[...chain].reverse();

  reversed.forEach(c=>{
    if(c.name.includes("Raigeki")){
      enemyField=[null,null,null];
      renderEnemyField();
    }
  });

  chain=[];
}

function selectTarget(i){
  selectedTarget=i;

  for(let x=0;x<3;x++){
    document.getElementById("enemy"+x).classList.remove("target");
  }

  document.getElementById("enemy"+i).classList.add("target");
}

function attackPhase(){
  if(!playerTurn) return;

  playerField.forEach((attacker,index)=>{
    if(!attacker || attacker.facedown) return;

    let target=enemyField[selectedTarget];

    // trap trigger
    if(target && target.type.includes("Trap")){
      alert("Trap Activated!");
      return;
    }

    if(target){
      if(attacker.atk>target.atk){
        enemyField[selectedTarget]=null;
        document.getElementById("enemyLP").innerText -= (attacker.atk-target.atk);
      } else {
        document.getElementById("playerLP").innerText -= (target.atk-attacker.atk);
      }
    } else {
      document.getElementById("enemyLP").innerText -= attacker.atk;
    }
  });

  renderEnemyField();
  enemyTurn();
}

function enemyTurn(){
  playerTurn=false;
  updateTurn();

  setTimeout(()=>{
    let best = baseCards.reduce((a,b)=> a.atk>b.atk?a:b);
    enemyField[0]=best;

    let dmg=enemyField.reduce((s,c)=>s+(c?c.atk:0),0);
    document.getElementById("playerLP").innerText -= dmg;

    renderEnemyField();
    playerTurn=true;
    updateTurn();
  },1000);
}

function renderEnemyField(){
  for(let i=0;i<3;i++){
    let z=document.getElementById("enemy"+i);
    let c=enemyField[i];

    if(c){
      z.style.backgroundImage=`url(${c.img})`;
      z.innerText="ATK:"+c.atk;
    } else {
      z.style.backgroundImage="";
      z.innerText="";
    }
  }
}

function updateTurn(){
  document.getElementById("turnText").innerText = playerTurn?"Your Turn":"Enemy Turn";
}

window.onload=startGame;

</script>

</body>
</html>
