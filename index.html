<!DOCTYPE html>
<html>
<head>
  <title>Duel Interface</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000 40%, #020024 100%);
      color: white;
      font-family: Arial;
      text-align: center;
    }

    nav {
      background: black;
      padding: 15px;
      border-bottom: 2px solid cyan;
    }

    nav a {
      color: cyan;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .lp {
      font-size: 24px;
      margin: 10px;
    }

    .field {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }

    .zone {
      width: 120px;
      height: 160px;
      border: 2px solid cyan;
      display: flex;
      align-items: center;
      justify-content: center;
      background-size: cover;
      background-position: center;
      white-space: pre-line;
      font-size: 12px;
    }

    .zone:hover {
      box-shadow: 0 0 15px cyan;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: cyan;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    /* HAND */
    .hand {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 20px;
    }

    .hand-card {
      width: 80px;
      height: 120px;
      background-size: cover;
      border: 2px solid gold;
      cursor: pointer;
    }

    .draw-anim {
     position: fixed;
     top: 40%;
     left: 50%;
     width: 100px;
     height: 140px;
     background-size: cover;
     background-position: center;
     transform: translate(-50%, -50%) scale(0.5);
     opacity: 0;
     z-index: 1000;
     animation: drawCardAnim 0.6s ease-out forwards;
   }

   @keyframes drawCardAnim {
     0% {
       transform: translate(-50%, -50%) scale(0.5);
       opacity: 0;
     }
     50% {
       transform: translate(-50%, -60%) scale(1.2);
       opacity: 1;
     }
     100% {
       transform: translate(-50%, 200%) scale(0.6);
       opacity: 0;
     }
   }

    .selected {
      box-shadow: 0 0 20px yellow;
    }
  </style>
</head>

<body>

  <nav>
    <a href="index.html">Duel</a>
  </nav>

  <h1>⚡ DUEL ARENA ⚡</h1>
  <h2 id="turnText">Your Turn</h2>

  <div>
    Your LP: <span id="playerLP">4000</span> |
    Enemy LP: <span id="enemyLP">4000</span>
  </div>

  <button onclick="drawCard()">Draw Card</button>
  <button onclick="attack()">Attack</button>

  <!-- HAND -->
  <h2>Your Hand</h2>
  <div id="hand" class="hand"></div>

  <!-- PLAYER FIELD -->
  <h2>Your Field</h2>
  <div class="field" id="playerField">
    <div class="zone" onclick="placeCard(0)"></div>
    <div class="zone" onclick="placeCard(1)"></div>
    <div class="zone" onclick="placeCard(2)"></div>
  </div>

  <!-- ENEMY FIELD -->
  <h2>Enemy Field</h2>
  <div class="field">
    <div class="zone" id="enemy0"></div>
    <div class="zone" id="enemy1"></div>
    <div class="zone" id="enemy2"></div>
  </div>

  <!-- GAME OVER -->
  <div id="gameOverScreen" style="display:none;">
    <h1 id="gameResult"></h1>
    <button onclick="location.reload()">Restart</button>
  </div>

<script>
let cards = [
  { name: "Blue-Eyes", atk: 3000, img: "https://images.ygoprodeck.com/images/cards/89631139.jpg" },
  { name: "Dark Magician", atk: 2500, img: "https://images.ygoprodeck.com/images/cards/46986414.jpg" },
  { name: "Red-Eyes", atk: 2400, img: "https://images.ygoprodeck.com/images/cards/74677422.jpg" }
];

let hand = [];
let selectedCardIndex = null;
let playerField = [null,null,null];
let enemyField = [null,null,null];

let playerTurn = true;
let gameOver = false;

function drawCard(){
  if(!playerTurn || gameOver) return;

  let card = cards[Math.floor(Math.random()*cards.length)];
  hand.push(card);

  // 🎴 create animation card
  let anim = document.createElement("div");
  anim.className = "draw-anim";
  anim.style.backgroundImage = `url(${card.img})`;

  document.body.appendChild(anim);

  setTimeout(() => {
    anim.remove();
    renderHand();
  }, 600);
}

function renderHand(){
  let handDiv = document.getElementById("hand");
  handDiv.innerHTML="";

  hand.forEach((card,i)=>{
    let div=document.createElement("div");
    div.className="hand-card";
    div.style.backgroundImage=`url(${card.img})`;

    if(i===selectedCardIndex) div.classList.add("selected");

    div.onclick=()=>{
      selectedCardIndex=i;
      renderHand();
    };

    handDiv.appendChild(div);
  });
}

function placeCard(i){
  if(selectedCardIndex===null) return;

  let card=hand[selectedCardIndex];
  playerField[i]=card;

  let zone=document.getElementById("playerField").children[i];
  zone.style.backgroundImage=`url(${card.img})`;
  zone.innerText="ATK:"+card.atk;

  hand.splice(selectedCardIndex,1);
  selectedCardIndex=null;

  renderHand();
}

function attack(){
  let total=playerField.reduce((s,c)=>s+(c?c.atk:0),0);

  let enemyLP=document.getElementById("enemyLP");
  enemyLP.innerText=Math.max(0,enemyLP.innerText-total);

  checkGame();

  playerTurn=false;
  setTimeout(enemyTurn,1000);
}

function enemyTurn(){
  let i=Math.floor(Math.random()*3);
  let card=cards[Math.floor(Math.random()*cards.length)];

  enemyField[i]=card;

  let zone=document.getElementById("enemy"+i);
  zone.style.backgroundImage=`url(${card.img})`;
  zone.innerText="ATK:"+card.atk;

  let total=enemyField.reduce((s,c)=>s+(c?c.atk:0),0);

  let playerLP=document.getElementById("playerLP");
  playerLP.innerText=Math.max(0,playerLP.innerText-total);

  checkGame();
  playerTurn=true;
}

function checkGame(){
  let p=parseInt(playerLP.innerText);
  let e=parseInt(enemyLP.innerText);

  if(e<=0) end("YOU WIN");
  if(p<=0) end("YOU LOSE");
}

function end(msg){
  gameOver=true;
  document.getElementById("gameOverScreen").style.display="block";
  document.getElementById("gameResult").innerText=msg;
}
</script>

</body>
</html>
