<!DOCTYPE html>
<html>
<head>
  <title>Duel Interface</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000 40%, #020024 100%);
      color: white;
      font-family: Arial;
      text-align: center;
      overflow-x: hidden;
    }

    nav {
      background: black;
      padding: 15px;
      border-bottom: 2px solid cyan;
    }

    nav a {
      color: cyan;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .arena {
      margin-top: 30px;
    }

    .lp {
      font-size: 24px;
      margin: 10px;
    }

    .card-zone {
      margin-top: 40px;
      perspective: 1000px;
    }

    .card {
      width: 150px;
      height: 220px;
      margin: auto;
      transform-style: preserve-3d;
      transition: transform 0.6s;
      cursor: pointer;
      position: relative;
    }

    .card.flip {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid gold;
    }

    .front {
      background: black;
    }

    .back {
      background: darkblue;
      transform: rotateY(180deg);
    }

    .glow {
      box-shadow: 0 0 30px cyan, 0 0 60px cyan;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: cyan;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    /* 💥 screen shake */
    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translate(0px); }
      25% { transform: translate(5px, -5px); }
      50% { transform: translate(-5px, 5px); }
      75% { transform: translate(5px, 5px); }
      100% { transform: translate(0px); }
    }
  </style>
</head>

<body id="body">

  <nav>
    <a href="index.html">Duel</a>
    <a href="deck.html">Deck</a>
    <a href="about.html">About</a>
  </nav>

  <h1>⚡ DUEL ARENA ⚡</h1>
   <h2 id="turnText">Your Turn</h2>

  <div class="arena">
    <div class="lp">Your LP: <span id="playerLP">4000</span></div>
    <div class="lp">Enemy LP: <span id="enemyLP">4000</span></div>
  </div>

  <button onclick="drawCard()">Draw Card</button>
  <button onclick="attack()">Attack</button>

  <div class="card-zone">
    <div class="card" id="card">
      <div class="card-face front" id="cardFront">?</div>
      <div class="card-face back" id="cardBack">🃏</div>
    </div>
  </div>

<div id="gameOverScreen" style="
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  color:white;
  font-size:40px;
  justify-content:center;
  align-items:center;
  flex-direction:column;
">
  <div id="gameResult"></div>
  <button onclick="restartGame()">Restart Duel</button>
</div>
  
  <script>
  let cards = [
    { name: "Blue-Eyes White Dragon", atk: 3000 },
    { name: "Dark Magician", atk: 2500 },
    { name: "Red-Eyes Black Dragon", atk: 2400 }
  ];

  let currentCard = null;

  let drawSound = new Audio("draw.mp3");
  let attackSound = new Audio("attack.mp3");

  drawSound.volume = 0.5;
  attackSound.volume = 0.7;

  let playerTurn = true;
  let gameOver = false;

  function updateTurnDisplay() {
    let turnText = document.getElementById("turnText");
    turnText.innerText = playerTurn ? "Your Turn" : "Enemy Turn";
  }

  function drawCard() {
    if (!playerTurn || gameOver) return;

    let card = document.getElementById("card");
    let front = document.getElementById("cardFront");

    currentCard = cards[Math.floor(Math.random() * cards.length)];

    card.classList.remove("flip", "glow");

    setTimeout(() => {
      front.innerText = currentCard.name + "\nATK: " + currentCard.atk;
      card.classList.add("flip", "glow");
    }, 200);

    drawSound.currentTime = 0;
    drawSound.play();
  }

  function attack() {
    if (!playerTurn || gameOver) return;

    if (!currentCard) {
      alert("Draw a card first!");
      return;
    }

    let enemyLP = document.getElementById("enemyLP");
    let body = document.getElementById("body");

    let value = parseInt(enemyLP.innerText);

    // ⚔️ damage based on ATK
    value -= currentCard.atk;

    if (value < 0) value = 0;

    enemyLP.innerText = value;

    body.classList.add("shake");
    setTimeout(() => body.classList.remove("shake"), 300);

    attackSound.currentTime = 0;
    attackSound.play();

    checkGameState();

    if (!gameOver) {
      playerTurn = false;
      updateTurnDisplay();
      setTimeout(enemyTurn, 1200);
    }
  }

  function enemyTurn() {
    if (gameOver) return;

    let playerLP = document.getElementById("playerLP");
    let body = document.getElementById("body");

    // enemy draws random card
    let enemyCard = cards[Math.floor(Math.random() * cards.length)];

    let value = parseInt(playerLP.innerText);
    value -= enemyCard.atk;

    if (value < 0) value = 0;

    playerLP.innerText = value;

    body.classList.add("shake");
    setTimeout(() => body.classList.remove("shake"), 300);

    attackSound.currentTime = 0;
    attackSound.play();

    alert("Enemy summons " + enemyCard.name + " (" + enemyCard.atk + " ATK)");

    checkGameState();

    if (!gameOver) {
      playerTurn = true;
      updateTurnDisplay();
    }
  }

  function checkGameState() {
    let playerLP = parseInt(document.getElementById("playerLP").innerText);
    let enemyLP = parseInt(document.getElementById("enemyLP").innerText);

    if (enemyLP <= 0) {
      endGame("🏆 YOU WIN!");
    } else if (playerLP <= 0) {
      endGame("💀 YOU LOSE!");
    }
  }

  function endGame(result) {
    gameOver = true;

    let screen = document.getElementById("gameOverScreen");
    let text = document.getElementById("gameResult");

    text.innerText = result;
    screen.style.display = "flex";
  }

  function restartGame() {
    location.reload();
  }

  window.onload = updateTurnDisplay;
</script>
</body>
</html>
