<!DOCTYPE html>
<html>
<head>
  <title>Duel Interface</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #000 40%, #020024 100%);
      color: white;
      font-family: Arial;
      text-align: center;
      overflow-x: hidden;
    }

    nav {
      background: black;
      padding: 15px;
      border-bottom: 2px solid cyan;
    }

    nav a {
      color: cyan;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    .arena {
      margin-top: 30px;
    }

    .lp {
      font-size: 24px;
      margin: 10px;
    }

    .field {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px;
    }

    .zone {
      width: 120px;
      height: 160px;
      border: 2px solid cyan;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      background: rgba(0,0,0,0.7);
      background-size: cover;
      background-position: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
      white-space: pre-line;
      text-align: center;
    }

    .zone:hover {
      box-shadow: 0 0 15px cyan;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background: cyan;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .shake {
      animation: shake 0.3s;
    }

    @keyframes shake {
      0% { transform: translate(0px); }
      25% { transform: translate(5px, -5px); }
      50% { transform: translate(-5px, 5px); }
      75% { transform: translate(5px, 5px); }
      100% { transform: translate(0px); }
    }
  </style>
</head>

<body id="body">

  <nav>
    <a href="index.html">Duel</a>
    <a href="deck.html">Deck</a>
    <a href="about.html">About</a>
  </nav>

  <h1>⚡ DUEL ARENA ⚡</h1>
  <h2 id="turnText">Your Turn</h2>

  <div class="arena">
    <div class="lp">Your LP: <span id="playerLP">4000</span></div>
    <div class="lp">Enemy LP: <span id="enemyLP">4000</span></div>
  </div>

  <button onclick="drawCard()">Draw Card</button>
  <button onclick="attack()">Attack</button>

  <!-- PLAYER FIELD -->
  <h2>Your Field</h2>
  <div class="field" id="playerField">
    <div class="zone" onclick="placeCard(0)"></div>
    <div class="zone" onclick="placeCard(1)"></div>
    <div class="zone" onclick="placeCard(2)"></div>
  </div>

  <!-- ENEMY FIELD -->
  <h2>Enemy Field</h2>
  <div class="field" id="enemyField">
    <div class="zone" id="enemy0"></div>
    <div class="zone" id="enemy1"></div>
    <div class="zone" id="enemy2"></div>
  </div>

  <!-- GAME OVER SCREEN -->
  <div id="gameOverScreen" style="
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    color:white;
    font-size:40px;
    justify-content:center;
    align-items:center;
    flex-direction:column;
  ">
    <div id="gameResult"></div>
    <button onclick="restartGame()">Restart Duel</button>
  </div>

  <script>
    let cards = [
  {
    name: "Blue-Eyes White Dragon",
    atk: 3000,
    img: "https://images.ygoprodeck.com/images/cards/89631139.jpg"
  },
  {
    name: "Dark Magician",
    atk: 2500,
    img: "https://images.ygoprodeck.com/images/cards/46986414.jpg"
  },
  {
    name: "Red-Eyes Black Dragon",
    atk: 2400,
    img: "https://images.ygoprodeck.com/images/cards/74677422.jpg"
  }
];

    let currentCard = null;
    let playerField = [null, null, null];
    let enemyField = [null, null, null];

    let drawSound = new Audio("draw.mp3");
    let attackSound = new Audio("attack.mp3");

    drawSound.volume = 0.5;
    attackSound.volume = 0.7;

    let playerTurn = true;
    let gameOver = false;

    function updateTurnDisplay() {
      document.getElementById("turnText").innerText =
        playerTurn ? "Your Turn" : "Enemy Turn";
    }

    function drawCard() {
      if (!playerTurn || gameOver) return;

      currentCard = cards[Math.floor(Math.random() * cards.length)];
      alert("Drew: " + currentCard.name + " (" + currentCard.atk + " ATK)");

      drawSound.currentTime = 0;
      drawSound.play();
    }

    function placeCard(index) {
      if (!playerTurn || gameOver) return;

      if (!currentCard) {
        alert("Draw a card first!");
        return;
      }

      if (playerField[index]) {
        alert("Zone occupied!");
        return;
      }

      playerField[index] = currentCard;

      let zone = document.getElementById("playerField").children[index];

      zone.style.backgroundImage = `url(${currentCard.img})`;
      zone.innerText = "ATK: " + currentCard.atk;
      currentCard = null;
    }

    function attack() {
      if (!playerTurn || gameOver) return;

      let totalAtk = playerField.reduce((sum, card) => {
        return sum + (card ? card.atk : 0);
      }, 0);

      let enemyLP = document.getElementById("enemyLP");
      let value = parseInt(enemyLP.innerText);

      value -= totalAtk;
      if (value < 0) value = 0;

      enemyLP.innerText = value;

      shakeScreen();
      playAttack();

      checkGameState();

      if (!gameOver) {
        playerTurn = false;
        updateTurnDisplay();
        setTimeout(enemyTurn, 1000);
      }
    }

    function enemyTurn() {
      if (gameOver) return;

      let index = Math.floor(Math.random() * 3);
      let card = cards[Math.floor(Math.random() * cards.length)];

      if (!enemyField[index]) {
        enemyField[index] = card;
        let zone = document.getElementById("enemy" + index);

        zone.style.backgroundImage = `url(${card.img})`;
        zone.innerText = "ATK: " + card.atk;
      }

      let totalAtk = enemyField.reduce((sum, c) => sum + (c ? c.atk : 0), 0);

      let playerLP = document.getElementById("playerLP");
      let value = parseInt(playerLP.innerText);

      value -= totalAtk;
      if (value < 0) value = 0;

      playerLP.innerText = value;

      shakeScreen();
      playAttack();

      checkGameState();

      if (!gameOver) {
        playerTurn = true;
        updateTurnDisplay();
      }
    }

    function shakeScreen() {
      let body = document.getElementById("body");
      body.classList.add("shake");
      setTimeout(() => body.classList.remove("shake"), 300);
    }

    function playAttack() {
      attackSound.currentTime = 0;
      attackSound.play();
    }

    function checkGameState() {
      let playerLP = parseInt(document.getElementById("playerLP").innerText);
      let enemyLP = parseInt(document.getElementById("enemyLP").innerText);

      if (enemyLP <= 0) endGame("🏆 YOU WIN!");
      if (playerLP <= 0) endGame("💀 YOU LOSE!");
    }

    function endGame(result) {
      gameOver = true;
      document.getElementById("gameResult").innerText = result;
      document.getElementById("gameOverScreen").style.display = "flex";
    }

    function restartGame() {
      location.reload();
    }

    window.onload = updateTurnDisplay;
  </script>

</body>
</html>
