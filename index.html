<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kaiba Duel System</title>

<style>

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{

  overflow:hidden;

  font-family:Arial, sans-serif;

  background:
    radial-gradient(circle at center,
    #081120 0%,
    #050816 45%,
    #000 100%);

  color:cyan;
}

/* ANIMATED GRID BACKGROUND */

body::before{

  content:"";

  position:fixed;

  inset:0;

  background-image:
    radial-gradient(cyan 1px, transparent 1px);

  background-size:45px 45px;

  opacity:.06;

  animation:bgMove 20s linear infinite;

  pointer-events:none;
}

@keyframes bgMove{

  from{
    transform:translateY(0);
  }

  to{
    transform:translateY(-200px);
  }
}

/* TITLE */

h1{

  text-align:center;

  margin-top:20px;

  font-size:42px;

  letter-spacing:4px;

  text-shadow:
    0 0 10px cyan,
    0 0 25px blue;
}

/* TURN TEXT */

#turnText{

  text-align:center;

  margin-top:10px;

  font-size:24px;

  text-shadow:
    0 0 10px cyan;
}

/* MAIN LAYOUT */

.game-container{

  display:grid;

  grid-template-columns:
    240px 1fr 240px;

  align-items:center;

  width:100vw;

  height:72vh;

  padding:20px;

  gap:40px;
}

/* SIDE PANELS */

.left-panel,
.right-panel{

  display:flex;

  flex-direction:column;

  gap:20px;
}

/* HOLOGRAM BOXES */

.hud-box{

  background:
    rgba(0,20,60,.35);

  border:
    1px solid rgba(0,255,255,.25);

  border-radius:15px;

  padding:20px;

  backdrop-filter:blur(10px);

  box-shadow:
    inset 0 0 20px rgba(0,255,255,.08),
    0 0 15px rgba(0,255,255,.12);
}

/* DUEL FIELD */

.arena{

  display:flex;

  flex-direction:column;

  justify-content:center;

  align-items:center;

  gap:25px;
}

/* FIELD ROWS */

.field-row{

  display:flex;

  gap:18px;
}

/* ZONES */

.zone{

  width:110px;
  height:160px;

  border-radius:12px;

  border:
    1px solid rgba(0,255,255,.3);

  background:
    linear-gradient(
      145deg,
      rgba(0,255,255,.04),
      rgba(0,0,40,.35)
    );

  background-size:cover;
  background-position:center;

  display:flex;

  justify-content:center;
  align-items:end;

  padding-bottom:8px;

  font-size:13px;

  font-weight:bold;

  text-shadow:0 0 10px black;

  box-shadow:
    inset 0 0 15px rgba(0,255,255,.05),
    0 0 10px rgba(0,255,255,.12);

  transition:.2s;

  cursor:pointer;
}

.zone:hover{

  transform:
    translateY(-4px)
    scale(1.03);

  box-shadow:
    0 0 18px rgba(0,255,255,.35);
}

/* SPELL/TRAP ZONES */

.spell-zone{

  height:90px;

  opacity:.75;
}

/* TARGET */

.target{

  box-shadow:
    0 0 20px crimson,
    0 0 40px red !important;
}

/* CENTER TEXT */

.middle-text{

  font-size:34px;

  letter-spacing:5px;

  text-shadow:
    0 0 12px cyan,
    0 0 25px blue;
}

/* HAND BAR */

.hand{

  position:fixed;

  bottom:0;

  left:0;

  width:100%;

  height:145px;

  display:flex;

  justify-content:center;

  align-items:flex-end;

  gap:12px;

  padding-bottom:10px;

  background:
    linear-gradient(
      to top,
      rgba(0,0,30,.96),
      rgba(0,0,30,.7)
    );

  border-top:
    1px solid rgba(0,255,255,.25);

  backdrop-filter:blur(12px);
}

/* HAND CARDS */

.hand-card{

  width:90px;
  height:130px;

  border-radius:10px;

  border:
    1px solid rgba(0,255,255,.25);

  background-size:cover;

  cursor:pointer;

  transition:.25s;

  box-shadow:
    0 0 10px rgba(0,255,255,.15);
}

.hand-card:hover{

  transform:
    translateY(-20px)
    scale(1.05);

  box-shadow:
    0 0 20px rgba(0,255,255,.35);
}

/* BUTTONS */

button{

  padding:12px 18px;

  border:none;

  border-radius:10px;

  background:
    rgba(0,140,255,.12);

  color:#7fefff;

  font-weight:bold;

  letter-spacing:1px;

  cursor:pointer;

  border:
    1px solid rgba(0,255,255,.2);

  box-shadow:
    0 0 8px rgba(0,255,255,.15);

  transition:.25s;
}

button:hover{

  transform:translateY(-2px);

  background:
    rgba(0,180,255,.18);

  box-shadow:
    0 0 15px rgba(0,255,255,.25);
}

/* LP */

.lp{

  font-size:24px;

  margin-top:10px;
}

</style>

</head>

<body>

<h1>⚡ KAIBA DUEL SYSTEM ⚡</h1>

<h2 id="turnText">Loading...</h2>

<div class="game-container">

  <!-- LEFT PANEL -->

  <div class="left-panel">

```
<div class="hud-box">

  <h2>YOU</h2>

  <div class="lp">
    LP:
    <span id="playerLP">4000</span>
  </div>

  <br>

  Deck:
  <span id="deckCount">0</span>

</div>

<button onclick="drawCard()">
  DRAW CARD
</button>

<button onclick="attackPhase()">
  ATTACK PHASE
</button>

<button onclick="window.location.href='deck.html'">
  🃏 DECK BUILDER
</button>
```

  </div>

  <!-- ARENA -->

  <div class="arena">

```
<!-- ENEMY SPELL/TRAP -->

<div class="field-row">

  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>

</div>

<!-- ENEMY MONSTERS -->

<div class="field-row">

  <div class="zone" id="enemy0"
    onclick="selectTarget(0)">
  </div>

  <div class="zone" id="enemy1"
    onclick="selectTarget(1)">
  </div>

  <div class="zone" id="enemy2"
    onclick="selectTarget(2)">
  </div>

  <div class="zone" id="enemy3"
    onclick="selectTarget(3)">
  </div>

  <div class="zone" id="enemy4"
    onclick="selectTarget(4)">
  </div>

</div>

<div class="middle-text">
  DUEL ARENA
</div>

<!-- PLAYER MONSTERS -->

<div class="field-row" id="playerMonsterField">

  <div class="zone"
    onclick="placeCard(0)">
  </div>

  <div class="zone"
    onclick="placeCard(1)">
  </div>

  <div class="zone"
    onclick="placeCard(2)">
  </div>

  <div class="zone"
    onclick="placeCard(3)">
  </div>

  <div class="zone"
    onclick="placeCard(4)">
  </div>

</div>

<!-- PLAYER SPELL/TRAP -->

<div class="field-row">

  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>
  <div class="zone spell-zone"></div>

</div>
```

  </div>

  <!-- RIGHT PANEL -->

  <div class="right-panel">

```
<div class="hud-box">

  <h2>ENEMY</h2>

  <div class="lp">
    LP:
    <span id="enemyLP">4000</span>
  </div>

</div>

<div class="hud-box">

  <h2>DUEL LOG</h2>

  <p>⚡ Duel initialized...</p>

</div>
```

  </div>

</div>

<!-- HAND -->

<div id="hand" class="hand"></div>

<script>

let baseCards=[];

let deck=[], hand=[];

let playerMonsters=[null,null,null,null,null];
let enemyMonsters=[null,null,null,null,null];

let playerSpells=[null,null,null,null,null];
let enemySpells=[null,null,null,null,null];

let selected=null;
let selectedTarget=0;

let playerTurn=true;

async function getCard(name){

  let res=await fetch(
    `https://db.ygoprodeck.com/api/v7/cardinfo.php?name=${encodeURIComponent(name)}`
  );

  let data=await res.json();

  let c=data.data[0];

  return {
    name:c.name,
    atk:c.atk||0,
    def:c.def||0,
    type:c.type,
    img:c.card_images[0].image_url
  };
}

async function startGame(){

  let savedDeck=
    localStorage.getItem("myDeck");

  if(savedDeck){

    baseCards=JSON.parse(savedDeck);

  }else{

    baseCards=[
      await getCard("Blue-Eyes White Dragon"),
      await getCard("Dark Magician"),
      await getCard("Red-Eyes Black Dragon")
    ];
  }

  buildDeck();

  for(let i=0;i<5;i++){

    drawCard();
  }

  enemyMonsters[0]=baseCards[0];

  renderEnemyMonsters();

  updateTurn();
}

function buildDeck(){

  deck=[...baseCards];

  shuffleDeck();

  updateDeckCount();
}

function shuffleDeck(){

  for(let i=deck.length-1;i>0;i--){

    let j=Math.floor(Math.random()*(i+1));

    [deck[i],deck[j]]=[deck[j],deck[i]];
  }
}

function drawCard(){

  if(!playerTurn || deck.length===0) return;

  let card=deck.pop();

  hand.push(card);

  renderHand();

  updateDeckCount();
}

function updateDeckCount(){

  document.getElementById(
    "deckCount"
  ).innerText=deck.length;
}

function renderHand(){

  let h=document.getElementById("hand");

  h.innerHTML="";

  hand.forEach((c,i)=>{

    let d=document.createElement("div");

    d.className="hand-card";

    d.style.backgroundImage=
      `url(${c.img})`;

    d.onclick=()=>{

      selected=i;
    };

    h.appendChild(d);
  });
}

function placeCard(i){

  if(selected===null) return;

  if(playerMonsters[i]) return;

  let card=hand[selected];

  playerMonsters[i]=card;

  let z=
    document
      .getElementById(
        "playerMonsterField"
      )
      .children[i];

  z.style.backgroundImage=
    `url(${card.img})`;

  z.innerText=`ATK ${card.atk}`;

  hand.splice(selected,1);

  selected=null;

  renderHand();
}

function selectTarget(i){

  selectedTarget=i;

  for(let x=0;x<5;x++){

    document
      .getElementById("enemy"+x)
      .classList
      .remove("target");
  }

  document
    .getElementById("enemy"+i)
    .classList
    .add("target");
}

function attackPhase(){

  if(!playerTurn) return;

  playerMonsters.forEach(attacker=>{

    if(!attacker) return;

    let target=
      enemyMonsters[selectedTarget];

    if(target){

      if(attacker.atk>target.atk){

        enemyMonsters[selectedTarget]=null;

        document.getElementById(
          "enemyLP"
        ).innerText -=
          (attacker.atk-target.atk);

      }else{

        document.getElementById(
          "playerLP"
        ).innerText -=
          (target.atk-attacker.atk);
      }

    }else{

      document.getElementById(
        "enemyLP"
      ).innerText -= attacker.atk;
    }
  });

  renderEnemyMonsters();

  enemyTurn();
}

function enemyTurn(){

  playerTurn=false;

  updateTurn();

  setTimeout(()=>{

    let best=
      baseCards.reduce(
        (a,b)=>a.atk>b.atk?a:b
      );

    enemyMonsters[0]=best;

    let dmg=
      enemyMonsters.reduce(
        (s,c)=>s+(c?c.atk:0),0
      );

    document.getElementById(
      "playerLP"
    ).innerText -= dmg;

    renderEnemyMonsters();

    playerTurn=true;

    updateTurn();

  },1000);
}

function renderEnemyMonsters(){

  for(let i=0;i<5;i++){

    let z=
      document.getElementById(
        "enemy"+i
      );

    let c=enemyMonsters[i];

    if(c){

      z.style.backgroundImage=
        `url(${c.img})`;

      z.innerText=`ATK ${c.atk}`;

    }else{

      z.style.backgroundImage="";

      z.innerText="";
    }
  }
}

function updateTurn(){

  document.getElementById(
    "turnText"
  ).innerText=
    playerTurn
      ? "YOUR TURN"
      : "ENEMY TURN";
}

window.onload=startGame;

</script>

</body>
</html>
