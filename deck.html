<!DOCTYPE html>
<html>
<head>
  <title>Deck Builder</title>

  <style>
    body { margin:0; background:black; color:cyan; font-family:Arial; text-align:center; }
    h1 { text-shadow:0 0 15px cyan; }

    input { padding:10px; width:250px; }
    button { padding:10px; margin:5px; background:cyan; border:none; cursor:pointer; box-shadow:0 0 10px cyan; }
    button:hover { box-shadow:0 0 25px cyan; transform:scale(1.05); }

    .results, .deck {
      display:flex; flex-wrap:wrap; justify-content:center;
      gap:10px; margin:20px;
    }

    .card {
      width:100px; height:140px;
      background-size:cover;
      border:2px solid cyan;
      cursor:pointer;
      transition:0.2s;
      position:relative;
    }

    .card:hover { transform:scale(1.1); box-shadow:0 0 15px cyan; }

    .count-badge{
      position:absolute; bottom:4px; right:4px;
      background:rgba(0,0,0,0.7); padding:2px 6px; font-size:12px;
      border:1px solid cyan;
    }

    .stats { margin:10px; font-size:18px; }
  </style>
</head>
<body>

<h1>🃏 DECK BUILDER</h1>

<button onclick="window.location.href='index.html'">⬅ Back to Duel</button>

<br><br>

<input id="searchInput" placeholder="Search card name..." />
<button onclick="searchCard()">Search</button>
<button onclick="saveDeck()">Save Deck</button>
<button onclick="clearDeck()">Clear Deck</button>

<div class="stats">
  Total: <span id="total">0</span> |
  Monsters: <span id="monsters">0</span> |
  Spells: <span id="spells">0</span> |
  Traps: <span id="traps">0</span>
</div>

<h2>Search Results</h2>
<div id="results" class="results"></div>

<h2>Your Deck</h2>
<div id="deck" class="deck"></div>

<script>

let deck = [];

// load saved deck
window.onload = function(){
  let saved = localStorage.getItem("myDeck");
  if(saved){
    deck = JSON.parse(saved);
    renderDeck();
  }
};

function getCounts(){
  let monsters=0, spells=0, traps=0;

  deck.forEach(c=>{
    if(c.type.includes("Monster")) monsters++;
    else if(c.type.includes("Spell")) spells++;
    else if(c.type.includes("Trap")) traps++;
  });

  return {monsters, spells, traps};
}

function getCardCopies(name){
  return deck.filter(c=>c.name===name).length;
}

function updateStats(){
  let {monsters, spells, traps} = getCounts();

  document.getElementById("total").innerText = deck.length;
  document.getElementById("monsters").innerText = monsters;
  document.getElementById("spells").innerText = spells;
  document.getElementById("traps").innerText = traps;
}

async function searchCard(){
  let name = document.getElementById("searchInput").value;

  if(!name) return alert("Enter a card name");

  let res = await fetch(`https://db.ygoprodeck.com/api/v7/cardinfo.php?fname=${encodeURIComponent(name)}`);
  let data = await res.json();

  let resultsDiv = document.getElementById("results");
  resultsDiv.innerHTML = "";

  if(!data.data){
    resultsDiv.innerHTML = "No results found";
    return;
  }

  data.data.slice(0,10).forEach(card => {

    let c = {
      name: card.name,
      atk: card.atk || 0,
      def: card.def || 0,
      type: card.type,
      img: card.card_images[0].image_url
    };

    let el = document.createElement("div");
    el.className = "card";
    el.style.backgroundImage = `url(${c.img})`;

    el.onclick = () => addToDeck(c);

    resultsDiv.appendChild(el);
  });
}

function addToDeck(card){
  let {monsters, spells, traps} = getCounts();

  // total limit
  if(deck.length >= 40){
    alert("Deck full (40 cards)");
    return;
  }

  // type limits
  if(card.type.includes("Monster") && monsters >= 20){
    alert("Max 20 monsters");
    return;
  }

  if(card.type.includes("Spell") && spells >= 10){
    alert("Max 10 spells");
    return;
  }

  if(card.type.includes("Trap") && traps >= 10){
    alert("Max 10 traps");
    return;
  }

  // 3 copy rule
  if(getCardCopies(card.name) >= 3){
    alert("Max 3 copies of a card");
    return;
  }

  deck.push(card);
  renderDeck();
}

function removeCard(index){
  deck.splice(index,1);
  renderDeck();
}

function renderDeck(){
  let d = document.getElementById("deck");
  d.innerHTML = "";

  let counts = {};

  deck.forEach(card=>{
    counts[card.name] = (counts[card.name] || 0) + 1;
  });

  deck.forEach((card,i)=>{
    let el = document.createElement("div");
    el.className = "card";
    el.style.backgroundImage = `url(${card.img})`;

    let badge = document.createElement("div");
    badge.className = "count-badge";
    badge.innerText = counts[card.name] + "x";

    el.appendChild(badge);

    el.onclick = () => removeCard(i);

    d.appendChild(el);
  });

  updateStats();
}

function saveDeck(){
  if(deck.length < 40){
    alert("Deck must be 40 cards!");
    return;
  }

  localStorage.setItem("myDeck", JSON.stringify(deck));
  alert("Deck Saved!");
}

function clearDeck(){
  deck = [];
  renderDeck();
}

</script>

</body>
</html>
